<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>查看完整信息并联系</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="screen p-4">
    <div class="notch"></div>
    <div class="status-bar">
      <span class="font-semibold">9:41</span>
      <div class="status-icons"><span>5G</span><span class="icon-dot"></span><span class="icon-dot"></span><span>87%</span></div>
    </div>
    <div class="pt-4 pb-24">
      <h2 class="text-lg font-bold">查看完整信息并联系</h2>
      <p class="text-sm text-slate-600 mt-1">已为你解锁联系方式，请在线下联系时注意核验身份与服务细节。</p>

      <div class="td-card p-4 mt-3">
        <div class="flex items-center justify-between">
          <p class="font-semibold">宠物主联系方式</p>
          <span class="td-tag bg-emerald-100 text-emerald-700">已解锁</span>
        </div>
        <div class="mt-3 space-y-2 text-sm">
          <div class="flex items-center justify-between rounded-xl bg-slate-50 px-3 py-2">
            <span class="text-slate-600">手机号</span>
            <span class="font-medium text-slate-800">138****0000</span>
          </div>
          <div class="flex items-center justify-between rounded-xl bg-slate-50 px-3 py-2">
            <span class="text-slate-600">微信号</span>
            <span class="font-medium text-slate-800">pet_owner_88</span>
          </div>
          <div class="flex items-center justify-between rounded-xl bg-slate-50 px-3 py-2">
            <span class="text-slate-600">社交账号</span>
            <span class="font-medium text-slate-800">小红书: 奶糖成长日记</span>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-2 mt-3">
          <button class="py-2 td-btn-secondary">复制手机号</button>
          <button class="py-2 td-btn-primary">复制微信号</button>
        </div>
      </div>

      <div class="td-card p-4 mt-3">
        <div class="flex items-center justify-between">
          <p class="font-semibold">寄养家庭联系方式</p>
          <span class="td-tag bg-emerald-100 text-emerald-700">已解锁</span>
        </div>
        <div class="mt-3 space-y-2 text-sm">
          <div class="flex items-center justify-between rounded-xl bg-slate-50 px-3 py-2">
            <span class="text-slate-600">手机号</span>
            <span class="font-medium text-slate-800">139****5678</span>
          </div>
          <div class="flex items-center justify-between rounded-xl bg-slate-50 px-3 py-2">
            <span class="text-slate-600">微信号</span>
            <span class="font-medium text-slate-800">host_family_sh</span>
          </div>
          <div class="flex items-center justify-between rounded-xl bg-slate-50 px-3 py-2">
            <span class="text-slate-600">社交账号</span>
            <span class="font-medium text-slate-500">未填写</span>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-2 mt-3">
          <button class="py-2 td-btn-secondary">复制手机号</button>
          <button class="py-2 td-btn-primary">复制微信号</button>
        </div>
      </div>

      <div class="td-card p-3 mt-3 bg-amber-50 border-amber-200">
        <p class="text-xs text-amber-700">
          平台仅提供信息对接，不参与交易、接单、担保或纠纷处理。请务必核验对方身份、寄养环境、宠物健康、费用与责任边界。
        </p>
      </div>
    </div>
  </div>
</body>
</html>
