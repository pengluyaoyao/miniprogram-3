<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>寄养家庭详情</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="screen p-4">
    <div class="notch"></div>
    <div class="status-bar">
      <span class="font-semibold">9:41</span>
      <div class="status-icons"><span>5G</span><span class="icon-dot"></span><span class="icon-dot"></span><span>87%</span></div>
    </div>
    <div class="pt-4 pb-24">
      <div class="td-card p-4">
        <h2 class="text-lg font-bold">甜甜阿姨寄养</h2>
        <p class="text-sm text-slate-500 mt-1">服务经验 4 年 · 距离 1.1km</p>
        <div class="flex gap-2 mt-2">
          <span class="td-tag bg-emerald-100 text-emerald-700">喂药</span>
          <span class="td-tag bg-sky-100 text-sky-700">接送</span>
          <span class="td-tag bg-violet-100 text-violet-700">独立空间</span>
        </div>
      </div>
      <div class="td-card p-4 mt-3">
        <p class="font-semibold">寄养环境</p>
        <p class="text-sm text-slate-600 mt-1">两室一厅，家中常驻一只友善比熊，每日消毒。</p>
      </div>
      <div class="td-card p-4 mt-3">
        <div class="flex items-center justify-between">
          <p class="font-semibold">寄养家庭照片</p>
          <span class="text-xs text-slate-500">共 8 张</span>
        </div>
        <div class="grid grid-cols-3 gap-2 mt-3">
          <div class="h-20 rounded-xl bg-orange-100 flex items-center justify-center text-[10px] text-orange-700">客厅环境</div>
          <div class="h-20 rounded-xl bg-sky-100 flex items-center justify-center text-[10px] text-sky-700">休息空间</div>
          <div class="h-20 rounded-xl bg-emerald-100 flex items-center justify-center text-[10px] text-emerald-700">喂食区</div>
          <div class="h-20 rounded-xl bg-violet-100 flex items-center justify-center text-[10px] text-violet-700">遛狗路线</div>
          <div class="h-20 rounded-xl bg-amber-100 flex items-center justify-center text-[10px] text-amber-700">日常照护</div>
          <div class="h-20 rounded-xl bg-slate-100 flex items-center justify-center text-[10px] text-slate-600">+3 更多</div>
        </div>
      </div>
      <div class="td-card p-3 mt-3 bg-amber-50 border-amber-200">
        <p class="text-xs text-amber-700">平台仅提供信息对接，不参与交易、担保或履约。联系前请核验身份与责任边界。</p>
      </div>
    </div>
    <div class="tabbar absolute bottom-0 left-0 w-full p-3 flex gap-2">
      <button class="py-2 px-4 td-btn-secondary">举报</button>
      <button class="flex-1 py-2 td-btn-secondary">收藏</button>
      <button class="flex-1 py-2 td-btn-primary">查看完整信息并联系</button>
    </div>
  </div>
</body>
</html>
