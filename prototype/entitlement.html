<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>查看权益</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="screen p-4">
    <div class="notch"></div>
    <div class="pt-4">
      <h2 class="text-lg font-bold">查看权益与付费</h2>
      <div class="td-card p-4 mt-3">
        <p class="text-sm text-slate-600">你的免费查看次数已用完。</p>
        <p class="font-semibold mt-1">开通 8 元 / 天信息查看权益</p>
        <p class="text-xs text-slate-500 mt-2">24小时内可查看更多完整信息。平台仅提供信息对接，不参与交易或担保。</p>
      </div>
      <div class="td-card p-4 mt-3 bg-amber-50 border-amber-200">
        <p class="text-xs text-amber-700">我已了解平台边界：联系前将自行核实身份、环境、费用、时间和责任边界。</p>
      </div>
      <div class="mt-4 space-y-2">
        <button class="w-full py-3 td-btn-primary">8 元开通 1 天</button>
        <button class="w-full py-3 td-btn-secondary">暂不开通</button>
      </div>
    </div>
  </div>
</body>
</html>
