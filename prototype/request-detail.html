<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>需求详情</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="screen p-4">
    <div class="notch"></div>
    <div class="status-bar">
      <span class="font-semibold">9:41</span>
      <div class="status-icons"><span>5G</span><span class="icon-dot"></span><span class="icon-dot"></span><span>87%</span></div>
    </div>
    <div class="pt-4 pb-24">
      <div class="td-card p-4">
        <h2 class="text-lg font-bold">柯基犬 · 短期寄养需求</h2>
        <p class="text-sm text-slate-500 mt-1">5月10日-5月12日 · 预算线下沟通</p>
      </div>
      <div class="td-card p-4 mt-3">
        <p class="font-semibold text-sm text-slate-700 mb-2">宠物照片</p>
        <div class="grid grid-cols-3 gap-2">
          <div class="h-20 rounded-xl bg-orange-100 flex items-center justify-center text-[10px] text-orange-700">奶糖正脸</div>
          <div class="h-20 rounded-xl bg-sky-100 flex items-center justify-center text-[10px] text-sky-700">散步中</div>
          <div class="h-20 rounded-xl bg-emerald-100 flex items-center justify-center text-[10px] text-emerald-700">室内状态</div>
        </div>
      </div>
      <div class="td-card p-4 mt-3">
        <p class="text-sm text-slate-700">需求描述：希望有遛狗经验，早晚各遛一次，支持每日回传视频。</p>
        <div class="flex gap-2 mt-2">
          <span class="td-tag bg-sky-100 text-sky-700">小型犬</span>
          <span class="td-tag bg-rose-100 text-rose-700">已免疫</span>
          <span class="td-tag bg-emerald-100 text-emerald-700">需喂药</span>
        </div>
      </div>
      <div class="td-card p-3 mt-3 bg-amber-50 border-amber-200">
        <p class="text-xs text-amber-700">查看后可直接看到联系方式，请优先确认寄养环境、宠物健康、费用与责任边界。</p>
      </div>
    </div>
    <div class="tabbar absolute bottom-0 left-0 w-full p-3 flex gap-2">
      <button class="py-2 px-4 td-btn-secondary">举报</button>
      <button class="flex-1 py-2 td-btn-primary">查看完整信息并联系宠主</button>
    </div>
  </div>
</body>
</html>
