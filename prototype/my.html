<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的页面</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="screen p-4">
    <div class="notch"></div>
    <div class="pt-4 pb-24">
      <div class="td-card p-4">
        <p class="font-semibold text-lg">毛球家长</p>
        <p class="text-sm text-slate-500">当前角色：宠物主人</p>
      </div>
      <div class="td-card p-3 mt-3 bg-orange-50 border-orange-100">
        <p class="text-sm text-orange-700">免费查看剩余：2 次</p>
      </div>
      <div class="td-card mt-3 divide-y">
        <div class="p-3">我的宠物档案</div>
        <div class="p-3">我的寄养需求</div>
        <div class="p-3">我的收藏</div>
        <div class="p-3">查看权益</div>
        <div class="p-3">联系过的对象</div>
        <div class="p-3">举报记录</div>
        <div class="p-3">设置</div>
      </div>
    </div>
    <div class="tabbar absolute bottom-0 left-0 w-full flex justify-around py-3 text-xs bg-white">
      <span>首页</span><span>发布</span><span>地图</span><span class="text-orange-500 font-semibold">我的</span>
    </div>
  </div>
</body>
</html>
