<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>角色选择</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="screen p-4">
    <div class="notch"></div>
    <div class="pt-6">
      <h2 class="text-xl font-bold text-slate-800">选择你的使用身份</h2>
      <p class="text-sm text-slate-600 mt-1">后续可在“我的-角色设置”中变更</p>
      <div class="mt-5 space-y-4">
        <div class="td-card p-4 border-2 border-orange-300">
          <p class="text-lg font-semibold">🐾 我是宠物主人</p>
          <p class="text-sm text-slate-500 mt-1">发布寄养需求，查看附近寄养家庭</p>
        </div>
        <div class="td-card p-4">
          <p class="text-lg font-semibold">🏡 我是寄养家庭</p>
          <p class="text-sm text-slate-500 mt-1">发布寄养资料，查看附近宠主需求</p>
        </div>
      </div>
      <button class="w-full mt-6 py-3 td-btn-primary">下一步（微信授权）</button>
    </div>
  </div>
</body>
</html>
