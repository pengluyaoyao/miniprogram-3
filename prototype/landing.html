<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Landing</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="screen p-4">
    <div class="notch"></div>
    <div class="status-bar">
      <span class="font-semibold">9:41</span>
      <div class="status-icons"><span>5G</span><span class="icon-dot"></span><span class="icon-dot"></span><span>87%</span></div>
    </div>
    <div class="pt-6 flex flex-col h-[780px]">
      <div class="text-center">
        <div class="text-4xl mb-3">🐶🐱</div>
        <h1 class="text-2xl font-bold text-slate-800">找到附近靠谱的家庭寄养信息</h1>
        <p class="text-sm text-slate-600 mt-3">平台只提供信息展示与联系方式对接，具体服务请双方线下自行确认。</p>
      </div>
      <div class="mt-8 td-card p-4">
        <p class="text-sm text-slate-500">当前城市</p>
        <p class="font-semibold text-slate-800">上海市 · 静安区</p>
      </div>
      <div class="mt-4 space-y-3">
        <button class="w-full py-3 td-btn-primary">我是宠物主人</button>
        <button class="w-full py-3 td-btn-secondary">我是寄养家庭</button>
      </div>
      <div class="mt-auto safe-bottom text-xs text-slate-500 leading-5">
        平台边界声明：本平台非交易平台，不提供线上接单、担保、保险或纠纷仲裁服务。
      </div>
    </div>
  </div>
</body>
</html>
