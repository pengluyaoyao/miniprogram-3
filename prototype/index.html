<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>宠物家庭寄养信息平台 - 原型总览</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="app-bg min-h-screen p-6">
  <header class="mb-6">
    <h1 class="text-2xl font-bold text-slate-800">宠物家庭寄养信息平台 · 原型总览</h1>
    <p class="text-slate-600 mt-1">每个页面为独立 HTML，通过 iframe 平铺展示（iPhone 15 Pro 尺寸模拟）。</p>
  </header>

  <main class="grid gap-6 grid-cols-1 md:grid-cols-2 xl:grid-cols-3">
    <section><p class="mb-2 font-medium">Landing</p><iframe class="phone-shell" src="./landing.html"></iframe></section>
    <section><p class="mb-2 font-medium">角色选择</p><iframe class="phone-shell" src="./role-select.html"></iframe></section>
    <section><p class="mb-2 font-medium">登录授权</p><iframe class="phone-shell" src="./login.html"></iframe></section>
    <section><p class="mb-2 font-medium">宠物档案编辑</p><iframe class="phone-shell" src="./pet-profile.html"></iframe></section>
    <section><p class="mb-2 font-medium">寄养资料编辑</p><iframe class="phone-shell" src="./provider-profile.html"></iframe></section>
    <section><p class="mb-2 font-medium">宠主首页（附近寄养家庭）</p><iframe class="phone-shell" src="./owner-home.html"></iframe></section>
    <section><p class="mb-2 font-medium">寄养家庭首页（附近需求）</p><iframe class="phone-shell" src="./provider-home.html"></iframe></section>
    <section><p class="mb-2 font-medium">地图页</p><iframe class="phone-shell" src="./map.html"></iframe></section>
    <section><p class="mb-2 font-medium">寄养家庭详情</p><iframe class="phone-shell" src="./provider-detail.html"></iframe></section>
    <section><p class="mb-2 font-medium">宠物需求详情</p><iframe class="phone-shell" src="./request-detail.html"></iframe></section>
    <section><p class="mb-2 font-medium">发布成功</p><iframe class="phone-shell" src="./publish.html"></iframe></section>
    <section><p class="mb-2 font-medium">我的页面</p><iframe class="phone-shell" src="./my.html"></iframe></section>
    <section><p class="mb-2 font-medium">查看权益与付费</p><iframe class="phone-shell" src="./entitlement.html"></iframe></section>
    <section><p class="mb-2 font-medium">查看完整信息并联系</p><iframe class="phone-shell" src="./contact-reveal.html"></iframe></section>
    <section><p class="mb-2 font-medium">空状态</p><iframe class="phone-shell" src="./states-empty.html"></iframe></section>
    <section><p class="mb-2 font-medium">骨架屏状态</p><iframe class="phone-shell" src="./states-skeleton.html"></iframe></section>
    <section><p class="mb-2 font-medium">弹窗层状态</p><iframe class="phone-shell" src="./states-dialog.html"></iframe></section>
    <section><p class="mb-2 font-medium">宠主发布 Step1</p><iframe class="phone-shell" src="./owner-publish-step1.html"></iframe></section>
    <section><p class="mb-2 font-medium">宠主发布 Step2</p><iframe class="phone-shell" src="./owner-publish-step2.html"></iframe></section>
    <section><p class="mb-2 font-medium">宠主发布 Step3</p><iframe class="phone-shell" src="./owner-publish-step3.html"></iframe></section>
    <section><p class="mb-2 font-medium">家庭发布 Step1</p><iframe class="phone-shell" src="./provider-publish-step1.html"></iframe></section>
    <section><p class="mb-2 font-medium">家庭发布 Step2</p><iframe class="phone-shell" src="./provider-publish-step2.html"></iframe></section>
    <section><p class="mb-2 font-medium">家庭发布 Step3</p><iframe class="phone-shell" src="./provider-publish-step3.html"></iframe></section>
    <section><p class="mb-2 font-medium">举报页</p><iframe class="phone-shell" src="./report.html"></iframe></section>
  </main>
</body>
</html>
